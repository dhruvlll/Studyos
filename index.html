<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#6366f1"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="StudyOS"/>
  <meta name="description" content="AI-powered study system with 30-day learning schedule, flashcards, planner and pomodoro timer"/>

  <title>LectureMate Pro — Study OS</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>

  <!-- Preload React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body { background: #07070f; color: #e0e0f0; font-family: 'Segoe UI', system-ui, sans-serif; overscroll-behavior: none; }
    input, textarea, button, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0f0f1a; }
    ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 4px; }
    /* iOS safe areas */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    /* Prevent text selection on buttons */
    button { -webkit-user-select: none; user-select: none; }
    /* Smooth scrolling */
    .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // EmailJS loader
    const loadEmailJS = () => new Promise((resolve) => {
      if (window.emailjs) { resolve(); return; }
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
      s.onload = () => resolve();
      document.head.appendChild(s);
    });

    // ─── localStorage persistence ─────────────────────────────────────────
    const LS = {
      get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v)   => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
    };

    // ─── Constants ────────────────────────────────────────────────────────
    const SCHEDULE = [
      { day:0,  label:"DAY 0 — STUDY",        emoji:"📚", color:"#06b6d4", tasks:["Read chapter / watch lecture","Quick Capture — brain dump during class","Draw Mind Map from memory after class","Sleep — memory consolidation begins tonight"] },
      { day:1,  label:"DAY 1 — RECALL",       emoji:"⚡", color:"#8b5cf6", tasks:["Active Recall — blank page, write everything from memory","Highlight all gaps you couldn't remember","Make flashcards for every gap"] },
      { day:2,  label:"DAY 2 — APPLY",        emoji:"✏️", color:"#3b82f6", tasks:["Practice questions — no solutions first","Ask 'Why is this true?' for each concept","Categorise wrong answers: forgot / miscalculated / misread"] },
      { day:3,  label:"DAY 3 — TEACH",        emoji:"🧑‍🏫", color:"#f97316", tasks:["Feynman Technique — explain like teaching a 12-year-old","Review Day 1 flashcards","Write summary in your own words"] },
      { day:7,  label:"DAY 7 — REINFORCE",    emoji:"💪", color:"#22c55e", tasks:["Spaced Repetition review","Interleaved Practice — mix with 2 older chapters","Redraw Mind Map completely from memory"] },
      { day:14, label:"DAY 14 — CONSOLIDATE", emoji:"📦", color:"#eab308", tasks:["Spaced Repetition review","Re-attempt Day 2 questions"] },
      { day:30, label:"DAY 30 — LOCK IN",     emoji:"🏆", color:"#ef4444", tasks:["Final Active Recall test — blank page, everything from scratch","Mark as ✅ Reviewed"] },
    ];
    const TIME_BLOCKS = ["12:00 AM–3:00 AM","3:00 AM–6:00 AM","6:00 AM–9:00 AM","9:00 AM–12:00 PM","12:00 PM–3:00 PM","3:00 PM–6:00 PM","6:00 PM–9:00 PM","9:00 PM–12:00 AM"];
    const DAYS_OF_WEEK = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const TABS = [{id:"lectures",icon:"📚",label:"Lectures"},{id:"flashcards",icon:"🃏",label:"Flashcards"},{id:"planner",icon:"🗓️",label:"Planner"},{id:"pomodoro",icon:"🍅",label:"Pomodoro"},{id:"dashboard",icon:"📊",label:"Dashboard"}];

    const clr = { bg:"#07070f", card:"#0f0f1a", border:"#1a1a2e", accent:"#6366f1", text:"#e0e0f0", muted:"#3a3a5a", dim:"#1e1e36", green:"#22c55e", red:"#ef4444" };
    const iSty = { width:"100%", padding:"11px 13px", background:"#0a0a14", border:`1px solid ${clr.dim}`, borderRadius:"10px", color:clr.text, fontSize:"14px", outline:"none", boxSizing:"border-box", fontFamily:"inherit" };
    const btn = (on, col="#6366f1") => ({ padding:"9px 16px", borderRadius:"10px", border:"none", cursor:"pointer", fontWeight:"700", fontSize:"13px", background:on?col:clr.dim, color:on?"white":clr.muted, transition:"all 0.2s" });

    function Card({ children, style={}, onClick }) { return <div onClick={onClick} style={{ background:clr.card, border:`1px solid ${clr.border}`, borderRadius:"14px", padding:"18px", cursor:onClick?"pointer":"default", ...style }}>{children}</div>; }
    function SecTitle({ label, children }) { return <div style={{ marginBottom:"14px" }}><div style={{ fontSize:"11px", color:clr.accent, letterSpacing:"2px", marginBottom:"3px" }}>{label}</div><div style={{ fontSize:"17px", fontWeight:"800" }}>{children}</div></div>; }
    function Row({ title, color, children }) { return <div style={{ marginBottom:"13px" }}><div style={{ fontSize:"11px", fontWeight:"700", color, letterSpacing:"1px", marginBottom:"7px" }}>{title}</div>{children}</div>; }

    const extractYTId    = (u) => { const m=u.match(/(?:v=|youtu\.be\/|shorts\/)([a-zA-Z0-9_-]{11})/); return m?m[1]:null; };
    const extractSheetId = (u) => { const m=u.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/); return m?m[1]:null; };

    // ─── Main App ─────────────────────────────────────────────────────────
    function StudyOS() {
      const [activeTab, setActiveTab]   = useState("lectures");
      const [lectures, setLectures]     = useState(() => LS.get("lectures", []));
      const [flashDecks, setFlashDecks] = useState(() => LS.get("flashDecks", []));
      const [dayPlans, setDayPlans]     = useState(() => LS.get("dayPlans", {}));
      const [popup, setPopup]           = useState(null);
      const [tgToken, setTgToken]       = useState(() => LS.get("tgToken", ""));
      const [tgChatId, setTgChatId]     = useState(() => LS.get("tgChatId", ""));
      const [tgOk, setTgOk]             = useState(() => LS.get("tgOk", false));
      const [ejServiceId,  setEjServiceId]  = useState(() => LS.get("ejServiceId", ""));
      const [ejTemplateId, setEjTemplateId] = useState(() => LS.get("ejTemplateId", ""));
      const [ejPublicKey,  setEjPublicKey]  = useState(() => LS.get("ejPublicKey", ""));
      const [ejEmail,      setEjEmail]      = useState(() => LS.get("ejEmail", ""));
      const [ejOk,         setEjOk]         = useState(() => LS.get("ejOk", false));

      // Persist to localStorage
      useEffect(() => LS.set("lectures",    lectures),    [lectures]);
      useEffect(() => LS.set("flashDecks",  flashDecks),  [flashDecks]);
      useEffect(() => LS.set("dayPlans",    dayPlans),    [dayPlans]);
      useEffect(() => LS.set("tgToken",     tgToken),     [tgToken]);
      useEffect(() => LS.set("tgChatId",    tgChatId),    [tgChatId]);
      useEffect(() => LS.set("tgOk",        tgOk),        [tgOk]);
      useEffect(() => LS.set("ejServiceId", ejServiceId), [ejServiceId]);
      useEffect(() => LS.set("ejTemplateId",ejTemplateId),[ejTemplateId]);
      useEffect(() => LS.set("ejPublicKey", ejPublicKey), [ejPublicKey]);
      useEffect(() => LS.set("ejEmail",     ejEmail),     [ejEmail]);
      useEffect(() => LS.set("ejOk",        ejOk),        [ejOk]);

      // Register service worker
      useEffect(() => {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        }
      }, []);

      const sendTg = useCallback(async (msg) => {
        if (!tgToken || !tgChatId) return;
        try { await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ chat_id:tgChatId, text:msg, parse_mode:"Markdown" }) }); } catch {}
      }, [tgToken, tgChatId]);

      const sendEmail = useCallback(async (subject, body) => {
        if (!ejServiceId || !ejTemplateId || !ejPublicKey || !ejEmail) return;
        try {
          await loadEmailJS();
          window.emailjs.init({ publicKey: ejPublicKey });
          await window.emailjs.send(ejServiceId, ejTemplateId, { to_email:ejEmail, subject, message:body });
        } catch (e) { console.error("EmailJS:", e); }
      }, [ejServiceId, ejTemplateId, ejPublicKey, ejEmail]);

      const testEmail = async () => {
        try {
          await loadEmailJS();
          window.emailjs.init({ publicKey: ejPublicKey });
          await window.emailjs.send(ejServiceId, ejTemplateId, { to_email:ejEmail, subject:"✅ LectureMate Pro — Email Connected!", message:"Your email reminders are set up! You'll receive study reminders on Day 1, 2, 3, 7, 14 and 30 for each lecture. Stay consistent! 🚀" });
          setEjOk(true);
        } catch { setEjOk(false); alert("Email test failed. Check your EmailJS credentials."); }
      };

      // Handle URL tab param
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const tab = params.get("tab");
        if (tab && TABS.find(t=>t.id===tab)) setActiveTab(tab);
      }, []);

      return (
        <div style={{ minHeight:"100vh", background:clr.bg, color:clr.text, fontFamily:"'Segoe UI',system-ui,sans-serif" }}>
          {/* Header */}
          <div style={{ background:clr.card, borderBottom:`1px solid ${clr.border}`, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:50, paddingTop:"max(12px,env(safe-area-inset-top))" }}>
            <div>
              <div style={{ fontSize:"10px", color:clr.accent, letterSpacing:"3px" }}>STUDY OS</div>
              <div style={{ fontSize:"17px", fontWeight:"900", background:"linear-gradient(135deg,#818cf8,#c084fc)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>📚 LectureMate Pro</div>
            </div>
            <div style={{ display:"flex", gap:"6px" }}>
              {tgOk && <span style={{ fontSize:"11px", color:clr.green, background:"#071407", border:"1px solid #1a3a1a", padding:"4px 8px", borderRadius:"20px" }}>✈️ TG</span>}
              {ejOk && <span style={{ fontSize:"11px", color:"#60a5fa", background:"#071420", border:"1px solid #1a3a5a", padding:"4px 8px", borderRadius:"20px" }}>📧 Email</span>}
            </div>
          </div>

          {/* Tab Bar */}
          <div style={{ display:"flex", gap:"4px", padding:"10px 12px", background:clr.card, borderBottom:`1px solid ${clr.border}`, overflowX:"auto" }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ ...btn(activeTab===t.id), padding:"7px 12px", fontSize:"12px", whiteSpace:"nowrap" }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          <div style={{ padding:"14px", maxWidth:"720px", margin:"0 auto", paddingBottom:"max(14px,env(safe-area-inset-bottom))" }}>
            {activeTab==="lectures"   && <LecturesTab lectures={lectures} setLectures={setLectures} flashDecks={flashDecks} setFlashDecks={setFlashDecks} sendTg={sendTg} sendEmail={sendEmail} tgToken={tgToken} setTgToken={setTgToken} tgChatId={tgChatId} setTgChatId={setTgChatId} tgOk={tgOk} setTgOk={setTgOk} ejServiceId={ejServiceId} setEjServiceId={setEjServiceId} ejTemplateId={ejTemplateId} setEjTemplateId={setEjTemplateId} ejPublicKey={ejPublicKey} setEjPublicKey={setEjPublicKey} ejEmail={ejEmail} setEjEmail={setEjEmail} ejOk={ejOk} testEmail={testEmail} setPopup={setPopup} />}
            {activeTab==="flashcards" && <FlashcardsTab flashDecks={flashDecks} />}
            {activeTab==="planner"    && <PlannerTab dayPlans={dayPlans} setDayPlans={setDayPlans} sendTg={sendTg} sendEmail={sendEmail} />}
            {activeTab==="pomodoro"   && <PomodoroTab sendTg={sendTg} sendEmail={sendEmail} />}
            {activeTab==="dashboard"  && <DashboardTab lectures={lectures} dayPlans={dayPlans} flashDecks={flashDecks} />}
          </div>

          {popup && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:"20px", backdropFilter:"blur(6px)" }}>
              <div style={{ background:clr.card, border:`2px solid ${popup.color}`, borderRadius:"20px", padding:"26px", maxWidth:"400px", width:"100%", boxShadow:`0 0 60px ${popup.color}40` }}>
                <div style={{ textAlign:"center", marginBottom:"14px" }}>
                  <div style={{ fontSize:"44px", marginBottom:"8px" }}>{popup.emoji}</div>
                  <div style={{ fontSize:"11px", letterSpacing:"2px", color:popup.color, marginBottom:"4px" }}>STUDY REMINDER</div>
                  <h3 style={{ margin:"0 0 12px", fontSize:"19px", color:popup.color }}>{popup.label}</h3>
                </div>
                {popup.tasks.map((t,i) => (
                  <div key={i} style={{ display:"flex", gap:"10px", padding:"9px 0", borderBottom:i<popup.tasks.length-1?`1px solid ${clr.dim}`:"none" }}>
                    <span style={{ color:popup.color, fontWeight:"800", minWidth:"16px" }}>{i+1}.</span>
                    <span style={{ fontSize:"13px", color:"#c0c0d8", lineHeight:"1.5" }}>{t}</span>
                  </div>
                ))}
                <button onClick={() => setPopup(null)} style={{ ...btn(true,popup.color), width:"100%", marginTop:"16px", padding:"12px", fontSize:"14px" }}>✅ Got it!</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════
    // LECTURES TAB
    // ══════════════════════════════════════════════
    function LecturesTab({ lectures, setLectures, flashDecks, setFlashDecks, sendTg, sendEmail, tgToken, setTgToken, tgChatId, setTgChatId, tgOk, setTgOk, ejServiceId, setEjServiceId, ejTemplateId, setEjTemplateId, ejPublicKey, setEjPublicKey, ejEmail, setEjEmail, ejOk, testEmail, setPopup }) {
      const [view, setView]         = useState("list");
      const [selId, setSelId]       = useState(null);
      const [inputTab, setInputTab] = useState("text");
      const [textIn, setTextIn]     = useState("");
      const [ytUrl, setYtUrl]       = useState("");
      const [pdfText, setPdfText]   = useState("");
      const [pdfName, setPdfName]   = useState("");
      const [sheetUrl, setSheetUrl] = useState("");
      const [sheetData, setSheetData] = useState("");
      const [sheetSt, setSheetSt]   = useState("idle");
      const [loading, setLoading]   = useState(false);
      const [tgStatus, setTgStatus] = useState("idle");
      const [tgSetup, setTgSetup]   = useState(false);
      const [ejSetup, setEjSetup]   = useState(false);
      const [ejStatus, setEjStatus] = useState("idle");
      const [openDay, setOpenDay]   = useState(0);
      const timers = useRef([]);

      const INPUT_TABS = [{k:"text",i:"✏️",l:"Text"},{k:"youtube",i:"🎬",l:"YouTube"},{k:"pdf",i:"📄",l:"PDF"},{k:"sheets",i:"📊",l:"Sheets"}];

      const handlePDF = async (file) => {
        setPdfName(file.name);
        try {
          const buf = await file.arrayBuffer();
          const str = new TextDecoder("latin1").decode(new Uint8Array(buf));
          const parts = [];
          for (const m of str.matchAll(/BT[\s\S]*?ET/g))
            for (const t of m[0].matchAll(/\((.*?)\)\s*T[jJ]/g))
              parts.push(t[1].replace(/\\[()\\]/g,"").replace(/[^\x20-\x7E]/g," "));
          const text = parts.join(" ").replace(/\s+/g," ").trim();
          setPdfText(text.length>50 ? text.substring(0,3000) : "Could not extract text. Please paste manually.");
        } catch { setPdfText("Error reading PDF."); }
      };

      const fetchSheet = async () => {
        const id = extractSheetId(sheetUrl);
        if (!id) { setSheetSt("error"); return; }
        setSheetSt("loading"); setSheetData("");
        try {
          const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv`);
          if (!res.ok) throw new Error();
          const csv = await res.text();
          const rows = csv.split("\n").map(r=>r.split(",").map(c=>c.replace(/^"|"$/g,"").trim()).filter(Boolean).join(" | ")).filter(r=>r.trim()).slice(0,100);
          setSheetData(rows.join("\n").substring(0,3000));
          setSheetSt("done");
        } catch { setSheetSt("error"); }
      };

      const getContent = async () => {
        if (inputTab==="text")   return textIn;
        if (inputTab==="pdf")    return pdfText;
        if (inputTab==="sheets") return `Spreadsheet data:\n${sheetData}`;
        if (inputTab==="youtube") {
          const vid = extractYTId(ytUrl);
          if (vid) { try { const r=await fetch(`https://www.youtube.com/oembed?url=https://youtube.com/watch?v=${vid}&format=json`); const d=await r.json(); return `YouTube: "${d.title}" by ${d.author_name}`; } catch {} }
          return `YouTube URL: ${ytUrl}`;
        }
        return "";
      };

      const canSubmit = (inputTab==="text"&&textIn.trim()) || (inputTab==="youtube"&&ytUrl.trim()) || (inputTab==="pdf"&&pdfText.trim()) || (inputTab==="sheets"&&sheetData.trim());

      const scheduleReminders = (lecture) => {
        timers.current.forEach(clearTimeout); timers.current=[];
        SCHEDULE.forEach(s => {
          const delay = new Date(lecture.startDate).getTime() + s.day*86400000 - Date.now();
          if (delay<0) return;
          const tid = setTimeout(async () => {
            setPopup(s);
            if ("Notification" in window && Notification.permission==="granted") new Notification(`${s.emoji} ${s.label}`,{body:s.tasks[0]});
            sendTg(`${s.emoji} *${s.label}*\n\n📖 Topic: *${lecture.topic}*\n\n${s.tasks.map((t,i)=>`${i+1}. ${t}`).join("\n")}`);
            sendEmail(`${s.emoji} LectureMate — ${s.label} | ${lecture.topic}`, `Hi! Time for your study session.\n\n${s.emoji} ${s.label}\n📖 Topic: ${lecture.topic}\n\nToday's tasks:\n${s.tasks.map((t,i)=>`${i+1}. ${t}`).join("\n")}\n\nConsistency beats intensity! 💪\n\n— LectureMate Pro`);
          }, delay);
          timers.current.push(tid);
        });
        timers.current.push(setTimeout(()=>setPopup({...SCHEDULE[1]}),5000));
      };

      const generate = async () => {
        setLoading(true);
        const content = await getContent();
        let notes = null;
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST", headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1200,
              messages:[{role:"user",content:`Create structured study notes from:\n\n${content}\n\nRespond ONLY in JSON (no backticks):\n{"topic":"name","concepts":["c1","c2","c3","c4"],"keyFacts":["f1","f2","f3"],"example":"example","examAngle":"angle","quickRevision":"2-3 sentences","flashcards":[{"q":"q1","a":"a1"},{"q":"q2","a":"a2"},{"q":"q3","a":"a3"},{"q":"q4","a":"a4"},{"q":"q5","a":"a5"}]}`}]
            })
          });
          const data = await res.json();
          notes = JSON.parse(data.content?.find(b=>b.type==="text")?.text?.replace(/```json|```/g,"").trim()||"null");
        } catch {}
        if (!notes) notes={topic:"Lecture",concepts:["Idea 1","Idea 2","Idea 3","Idea 4"],keyFacts:["Fact 1","Fact 2","Fact 3"],example:"A real-world example.",examAngle:"Core concepts and applications.",quickRevision:"Review key ideas and follow the 30-day plan.",flashcards:[{q:"Main topic?",a:"Your lecture topic"},{q:"Key concept?",a:"Core idea"},{q:"Formula?",a:"Key formula"},{q:"Example?",a:"Real world"},{q:"Exam angle?",a:"Application"}]};

        const lecture = {id:Date.now(),topic:notes.topic,concepts:notes.concepts,keyFacts:notes.keyFacts,example:notes.example,examAngle:notes.examAngle,quickRevision:notes.quickRevision,startDate:new Date().toISOString(),checklist:{}};
        setLectures(prev=>[lecture,...prev]);
        if (notes.flashcards?.length) setFlashDecks(prev=>[{id:Date.now(),topic:notes.topic,cards:notes.flashcards,created:new Date().toISOString()},...prev]);
        scheduleReminders(lecture);
        sendTg(`🚀 *Study plan started!*\n\n📖 *${notes.topic}*\n\nReminders: Day 1, 2, 3, 7, 14, 30 ✅`);
        sendEmail(`🚀 LectureMate — Study Plan Started: ${notes.topic}`,`Your 30-day study plan has started!\n\n📖 Topic: ${notes.topic}\n\nSchedule:\n• Day 0 — Study (now)\n• Day 1 — Recall\n• Day 2 — Apply\n• Day 3 — Teach\n• Day 7 — Reinforce\n• Day 14 — Consolidate\n• Day 30 — Lock In\n\nYou'll receive reminders on each day!\n\n— LectureMate Pro`);
        setSelId(lecture.id); setView("detail"); setLoading(false);
        setTextIn(""); setYtUrl(""); setPdfText(""); setPdfName(""); setSheetUrl(""); setSheetData(""); setSheetSt("idle");
      };

      const testTg = async () => {
        setTgStatus("testing");
        try {
          await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:tgChatId,text:"✅ *LectureMate Pro connected!* Reminders will arrive on Day 1, 2, 3, 7, 14 & 30 🚀",parse_mode:"Markdown"})});
          setTgStatus("ok"); setTgOk(true);
        } catch { setTgStatus("error"); }
      };

      const handleTestEmail = async () => {
        setEjStatus("testing");
        try { await testEmail(); setEjStatus("ok"); } catch { setEjStatus("error"); }
      };

      const toggleCheck = (lectureId,day,idx) => {
        setLectures(prev=>prev.map(l=>{ if(l.id!==lectureId) return l; const key=`${day}-${idx}`; return {...l,checklist:{...l.checklist,[key]:!l.checklist?.[key]}}; }));
      };
      const getProgress = (lecture,day) => { const s=SCHEDULE.find(x=>x.day===day); if(!s) return 0; const done=s.tasks.filter((_,i)=>lecture.checklist?.[`${day}-${i}`]).length; return Math.round((done/s.tasks.length)*100); };

      const NotifSettings = () => (
        <Card style={{marginBottom:"12px"}}>
          <div style={{fontSize:"11px",color:clr.accent,letterSpacing:"1px",marginBottom:"14px"}}>🔔 NOTIFICATION SETTINGS</div>
          <div style={{padding:"13px",background:"#0a0a14",borderRadius:"10px",marginBottom:"10px"}}>
            <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"4px"}}>✈️ Telegram Bot</div>
            <div style={{fontSize:"11px",color:clr.muted,marginBottom:"10px"}}>FREE · Fully automatic · Works when app is closed</div>

    // FLASHCARDS TAB

    function FlashcardsTab({ flashDecks }) {
      const [activeDeck,setActiveDeck]=useState(null);
      const [cardIdx,setCardIdx]=useState(0);
      const [flipped,setFlipped]=useState(false);
      const [scores,setScores]=useState({});
      if (activeDeck) {
        const deck=flashDecks.find(d=>d.id===activeDeck);
        if(!deck){setActiveDeck(null);return null;}
        const card=deck.cards[cardIdx],total=deck.cards.length,known=Object.values(scores).filter(v=>v==="know").length;
        return (<div>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}>
            <button onClick={()=>{setActiveDeck(null);setCardIdx(0);setFlipped(false);setScores({});}} style={{...btn(false),padding:"7px 12px"}}>← Back</button>
            <div style={{fontWeight:"800",fontSize:"15px"}}>🃏 {deck.topic}</div>
            <div style={{marginLeft:"auto",fontSize:"12px",color:clr.muted}}>{cardIdx+1}/{total}</div>
          </div>
          <div style={{height:"4px",background:clr.dim,borderRadius:"4px",marginBottom:"14px"}}><div style={{height:"100%",width:`${(cardIdx/total)*100}%`,background:"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:"4px"}}/></div>
          <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
            <Card style={{flex:1,textAlign:"center",padding:"12px"}}><div style={{fontSize:"20px",fontWeight:"900",color:clr.green}}>{known}</div><div style={{fontSize:"11px",color:clr.muted}}>Know it ✅</div></Card>
            <Card style={{flex:1,textAlign:"center",padding:"12px"}}><div style={{fontSize:"20px",fontWeight:"900",color:clr.red}}>{Object.values(scores).filter(v=>v==="review").length}</div><div style={{fontSize:"11px",color:clr.muted}}>Review 🔄</div></Card>
          </div>
          <div onClick={()=>setFlipped(f=>!f)} style={{background:flipped?"#0a1a2e":"#12121e",border:`2px solid ${flipped?"#6366f1":clr.border}`,borderRadius:"16px",padding:"36px 22px",textAlign:"center",cursor:"pointer",minHeight:"180px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"all 0.3s",marginBottom:"12px"}}>
            <div style={{fontSize:"11px",color:flipped?"#818cf8":clr.muted,letterSpacing:"2px",marginBottom:"12px"}}>{flipped?"ANSWER":"QUESTION — tap to flip"}</div>
            <div style={{fontSize:"15px",fontWeight:"700",lineHeight:"1.6",color:flipped?"#c0d8ff":clr.text}}>{flipped?card.a:card.q}</div>
          </div>
          {flipped&&cardIdx<total-1&&(<div style={{display:"flex",gap:"8px"}}>
            <button onClick={()=>{setScores(p=>({...p,[cardIdx]:"review"}));setCardIdx(i=>i+1);setFlipped(false);}} style={{flex:1,padding:"12px",background:"#1a0707",border:"1px solid #3a1a1a",borderRadius:"12px",color:clr.red,fontWeight:"700",fontSize:"13px",cursor:"pointer"}}>🔄 Need Review</button>
            <button onClick={()=>{setScores(p=>({...p,[cardIdx]:"know"}));setCardIdx(i=>i+1);setFlipped(false);}} style={{flex:1,padding:"12px",background:"#071407",border:"1px solid #1a3a1a",borderRadius:"12px",color:clr.green,fontWeight:"700",fontSize:"13px",cursor:"pointer"}}>✅ Know It!</button>
          </div>)}
          {cardIdx===total-1&&flipped&&(<Card style={{textAlign:"center",marginTop:"12px"}}>
            <div style={{fontSize:"30px",marginBottom:"6px"}}>🎉</div>
            <div style={{fontWeight:"800",fontSize:"16px",marginBottom:"4px"}}>Deck Complete!</div>
            <div style={{fontSize:"13px",color:clr.muted}}>Score: {known}/{total} known</div>
            <div style={{height:"5px",background:clr.dim,borderRadius:"5px",margin:"10px 0"}}><div style={{height:"100%",width:`${(known/total)*100}%`,background:clr.green,borderRadius:"5px"}}/></div>
            <button onClick={()=>{setCardIdx(0);setFlipped(false);setScores({});}} style={{...btn(true,clr.accent),width:"100%",padding:"11px",marginTop:"4px"}}>🔄 Restart</button>
          </Card>)}
        </div>);
      }
      return (<div>
        <SecTitle label="FLASHCARD DECKS">Study Decks</SecTitle>
        {flashDecks.length===0?(<Card style={{textAlign:"center",padding:"44px"}}><div style={{fontSize:"44px",marginBottom:"10px"}}>🃏</div><div style={{fontWeight:"700",color:clr.muted}}>No decks yet</div><div style={{fontSize:"13px",color:clr.muted,marginTop:"5px"}}>Flashcards auto-generate when you add a lecture</div></Card>
        ):flashDecks.map(d=>(<Card key={d.id} style={{marginBottom:"9px"}} onClick={()=>{setActiveDeck(d.id);setCardIdx(0);setFlipped(false);setScores({});}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:"800",fontSize:"14px"}}>🃏 {d.topic}</div><div style={{fontSize:"12px",color:clr.muted,marginTop:"3px"}}>{d.cards.length} cards · {new Date(d.created).toLocaleDateString()}</div></div><span style={{fontSize:"20px",color:clr.muted}}>→</span></div>
        </Card>))}
      </div>);
    }

    // ══════════════════════════════════════════════
    // PLANNER TAB
    // ══════════════════════════════════════════════
    function PlannerTab({ dayPlans, setDayPlans }) {
      const today=new Date();
      const [view,setView]=useState("day");
      const [selDate,setSelDate]=useState(today.toISOString().split("T")[0]);
      const [editBlock,setEditBlock]=useState(null);
      const [editType,setEditType]=useState("planned");
      const [editText,setEditText]=useState("");
      const [calMonth,setCalMonth]=useState({y:today.getFullYear(),m:today.getMonth()});
      const dk=(d)=>typeof d==="string"?d:d.toISOString().split("T")[0];
      const getPlan=(date,block)=>dayPlans[dk(date)]?.[block]||{};
      const setPlan=(date,block,type,val)=>{const key=dk(date);setDayPlans(prev=>({...prev,[key]:{...prev[key],[block]:{...prev[key]?.[block],[type]:val}}}));};
      const weekDays=(ds)=>{const s=new Date(ds);s.setDate(s.getDate()-s.getDay());return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(d.getDate()+i);return d;});};

      const renderDay=()=>(<div>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}}>
          <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{...iSty,width:"auto",padding:"8px 12px",fontSize:"13px"}}/>
          <div style={{fontSize:"12px",color:clr.muted}}>{new Date(selDate+"T12:00:00").toLocaleDateString("en",{weekday:"long",month:"short",day:"numeric"})}</div>
        </div>
        <div style={{display:"flex",gap:"10px",marginBottom:"10px",fontSize:"12px"}}><span style={{color:clr.green}}>● Planned</span><span style={{color:clr.red}}>● Actual</span></div>
        {TIME_BLOCKS.map(block=>{const plan=getPlan(selDate,block);return(<div key={block} style={{marginBottom:"7px",borderRadius:"11px",overflow:"hidden",border:`1px solid ${clr.dim}`}}>
          <div style={{padding:"9px 13px",background:"#0d0d1a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:"12px",fontWeight:"700",color:clr.accent}}>⏰ {block}</span>
            <div style={{display:"flex",gap:"5px"}}>{plan.planned&&<span style={{width:"7px",height:"7px",borderRadius:"50%",background:clr.green,display:"inline-block"}}/>}{plan.actual&&<span style={{width:"7px",height:"7px",borderRadius:"50%",background:clr.red,display:"inline-block"}}/>}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1px",background:clr.dim}}>
            {["planned","actual"].map(type=>(<div key={type} onClick={()=>{setEditBlock(block);setEditType(type);setEditText(plan[type]||"");}} style={{background:type==="planned"?"#071407":"#1a0707",padding:"10px 12px",cursor:"pointer",minHeight:"52px"}}>
              <div style={{fontSize:"10px",color:type==="planned"?clr.green:clr.red,letterSpacing:"1px",marginBottom:"3px"}}>{type==="planned"?"📋 PLANNED":"✅ ACTUAL"}</div>
              <div style={{fontSize:"12px",color:plan[type]?clr.text:clr.muted,lineHeight:"1.4"}}>{plan[type]||"Tap to add…"}</div>
            </div>))}
          </div>
        </div>);})}
      </div>);

      const renderWeek=()=>{
        const days=weekDays(selDate),tPl=days.reduce((s,d)=>s+TIME_BLOCKS.filter(b=>getPlan(d,b).planned).length,0),tAc=days.reduce((s,d)=>s+TIME_BLOCKS.filter(b=>getPlan(d,b).actual).length,0);
        return(<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <div style={{fontWeight:"700"}}>Week of {days[0].toLocaleDateString("en",{month:"short",day:"numeric"})}</div>
            <div style={{display:"flex",gap:"6px"}}>
              <button onClick={()=>{const d=new Date(selDate);d.setDate(d.getDate()-7);setSelDate(d.toISOString().split("T")[0]);}} style={{...btn(false),padding:"6px 10px",fontSize:"12px"}}>◀</button>
              <button onClick={()=>{const d=new Date(selDate);d.setDate(d.getDate()+7);setSelDate(d.toISOString().split("T")[0]);}} style={{...btn(false),padding:"6px 10px",fontSize:"12px"}}>▶</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"12px"}}>
            {[["📋 Planned",tPl,clr.green],["✅ Actual",tAc,clr.red]].map(([l,v,c])=>(<Card key={l} style={{padding:"14px"}}><div style={{fontSize:"24px",fontWeight:"900",color:c}}>{v}</div><div style={{fontSize:"12px",color:clr.muted}}>{l}</div><div style={{fontSize:"11px",color:c,marginTop:"2px"}}>{Math.round((v/56)*100)}% of week</div></Card>))}
          </div>
          <Card><div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"11px"}}>
              <thead><tr><th style={{padding:"6px",textAlign:"left",color:clr.muted}}>Block</th>{days.map(d=><th key={dk(d)} style={{padding:"6px",textAlign:"center",color:dk(d)===selDate?clr.accent:clr.muted}}>{DAYS_OF_WEEK[d.getDay()]}<br/>{d.getDate()}</th>)}</tr></thead>
              <tbody>{TIME_BLOCKS.map(block=>(<tr key={block}><td style={{padding:"4px 6px",color:clr.muted,fontSize:"10px",whiteSpace:"nowrap"}}>{block.split("–")[0]}</td>
                {days.map(d=>{const p=getPlan(d,block),hp=!!p.planned,ha=!!p.actual;return(<td key={dk(d)} style={{padding:"3px",textAlign:"center"}} onClick={()=>{setSelDate(dk(d));setView("day");}}>
                  <div style={{width:"24px",height:"17px",borderRadius:"3px",margin:"0 auto",background:hp&&ha?"#f59e0b20":hp?"#22c55e20":ha?"#ef444420":clr.dim,border:`1px solid ${hp&&ha?"#f59e0b":hp?clr.green:ha?clr.red:clr.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:"8px"}}>{hp&&ha&&"✓"}</div>
                </td>);})}</tr>))}</tbody>
            </table>
          </div></Card>
        </div>);
      };

      const renderMonth=()=>{
        const {y,m}=calMonth,firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate();
        const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)],todayStr=today.toISOString().split("T")[0];
        return(<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <div style={{fontWeight:"800",fontSize:"15px"}}>{MONTHS[m]} {y}</div>
            <div style={{display:"flex",gap:"6px"}}>
              <button onClick={()=>setCalMonth(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})} style={{...btn(false),padding:"6px 10px"}}>◀</button>
              <button onClick={()=>setCalMonth(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})} style={{...btn(false),padding:"6px 10px"}}>▶</button>
            </div>
          </div>
          <Card style={{marginBottom:"10px"}}><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",textAlign:"center"}}>
            {DAYS_OF_WEEK.map(d=><div key={d} style={{fontSize:"10px",color:clr.muted,fontWeight:"700",padding:"4px"}}>{d}</div>)}
            {cells.map((day,i)=>{if(!day)return<div key={i}/>;const dkk=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;const pl=TIME_BLOCKS.filter(b=>dayPlans[dkk]?.[b]?.planned).length,ac=TIME_BLOCKS.filter(b=>dayPlans[dkk]?.[b]?.actual).length,isToday=dkk===todayStr,isSel=dkk===selDate;
              return(<div key={i} onClick={()=>{setSelDate(dkk);setView("day");}} style={{padding:"5px 2px",borderRadius:"7px",cursor:"pointer",background:isSel?"#1e1e3a":isToday?"#0f0f2a":"transparent",border:`1px solid ${isSel?clr.accent:isToday?clr.dim:"transparent"}`}}>
                <div style={{fontSize:"12px",fontWeight:isToday?"900":"600",color:isToday?clr.accent:clr.text}}>{day}</div>
                <div style={{display:"flex",gap:"2px",justifyContent:"center",marginTop:"2px"}}>{pl>0&&<div style={{width:"4px",height:"4px",borderRadius:"50%",background:clr.green}}/>}{ac>0&&<div style={{width:"4px",height:"4px",borderRadius:"50%",background:clr.red}}/>}</div>
              </div>);
            })}
          </div></Card>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
            {[["📋 Planned",Object.keys(dayPlans).filter(k=>k.startsWith(`${y}-${String(m+1).padStart(2,"0")}`)).reduce((s,k)=>s+TIME_BLOCKS.filter(b=>dayPlans[k]?.[b]?.planned).length,0),clr.green],
              ["✅ Actual",Object.keys(dayPlans).filter(k=>k.startsWith(`${y}-${String(m+1).padStart(2,"0")}`)).reduce((s,k)=>s+TIME_BLOCKS.filter(b=>dayPlans[k]?.[b]?.actual).length,0),clr.red]
            ].map(([l,v,c])=>(<Card key={l} style={{padding:"14px"}}><div style={{fontSize:"24px",fontWeight:"900",color:c}}>{v}</div><div style={{fontSize:"12px",color:clr.muted}}>{l} this month</div></Card>))}
          </div>
        </div>);
      };

      return(<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
          <SecTitle label="TIME BLOCK PLANNER">Daily Planner</SecTitle>
          <div style={{display:"flex",gap:"5px"}}>{["day","week","month"].map(v=><button key={v} onClick={()=>setView(v)} style={{...btn(view===v),padding:"7px 10px",fontSize:"12px",textTransform:"capitalize"}}>{v}</button>)}</div>
        </div>
        {view==="day"&&renderDay()}{view==="week"&&renderWeek()}{view==="month"&&renderMonth()}
        {editBlock&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"20px",backdropFilter:"blur(4px)"}}>
          <div style={{background:clr.card,border:`2px solid ${editType==="planned"?clr.green:clr.red}`,borderRadius:"16px",padding:"22px",maxWidth:"360px",width:"100%"}}>
            <div style={{fontSize:"11px",color:editType==="planned"?clr.green:clr.red,letterSpacing:"2px",marginBottom:"5px"}}>{editType==="planned"?"📋 PLANNED":"✅ ACTUAL"}</div>
            <div style={{fontWeight:"800",fontSize:"15px",marginBottom:"12px"}}>⏰ {editBlock}</div>
            <textarea value={editText} onChange={e=>setEditText(e.target.value)} placeholder={editType==="planned"?"What do you plan to do?":"What did you actually do?"} style={{...iSty,minHeight:"90px",resize:"vertical",lineHeight:"1.6",marginBottom:"12px"}}/>
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={()=>setEditBlock(null)} style={{...btn(false),flex:1}}>Cancel</button>
              <button onClick={()=>{setPlan(selDate,editBlock,editType,editText);setEditBlock(null);}} style={{...btn(true,editType==="planned"?clr.green:clr.red),flex:1}}>Save</button>
            </div>
          </div>
        </div>)}
      </div>);
    }

    // ══════════════════════════════════════════════
    // POMODORO TAB
    // ══════════════════════════════════════════════
    function PomodoroTab({ sendTg, sendEmail }) {
      const [mode,setMode]=useState("work");
      const [secs,setSecs]=useState(25*60);
      const [running,setRunning]=useState(false);
      const [sessions,setSessions]=useState(0);
      const [task,setTask]=useState("");
      const [history,setHistory]=useState([]);
      const interval=useRef(null);
      const MODES={work:{label:"Focus",min:25,color:"#6366f1"},short:{label:"Short Break",min:5,color:"#22c55e"},long:{label:"Long Break",min:15,color:"#f59e0b"}};
      const setMode_=(m)=>{setMode(m);setSecs(MODES[m].min*60);setRunning(false);clearInterval(interval.current);};
      useEffect(()=>{
        if(running){interval.current=setInterval(()=>{setSecs(s=>{if(s<=1){clearInterval(interval.current);setRunning(false);if(mode==="work"){const n=sessions+1;setSessions(n);setHistory(h=>[{task,at:new Date().toLocaleTimeString(),mins:MODES[mode].min},...h.slice(0,9)]);sendTg(`🍅 *Pomodoro complete!*\n\nTask: ${task||"Focus session"}\nDuration: ${MODES[mode].min} minutes`);sendEmail(`🍅 Pomodoro Done — ${task||"Focus session"}`,`Great work! ${MODES[mode].min}-minute session complete.\n\nTask: ${task||"Focus session"}\nSessions today: ${n}\n\nKeep going! 🚀`);if("Notification"in window&&Notification.permission==="granted")new Notification("🍅 Pomodoro Done!",{body:`${task||"Session"} — ${MODES[mode].min}m complete!`});}return 0;}return s-1;});},1000);}else{clearInterval(interval.current);}return()=>clearInterval(interval.current);
      },[running,mode,task,sessions]);
      const mins=String(Math.floor(secs/60)).padStart(2,"0"),sec_=String(secs%60).padStart(2,"0"),pct=(secs/(MODES[mode].min*60))*100,col=MODES[mode].color;
      return(<div>
        <SecTitle label="POMODORO TIMER">Focus Sessions</SecTitle>
        <div style={{display:"flex",gap:"7px",marginBottom:"16px"}}>{Object.entries(MODES).map(([k,v])=><button key={k} onClick={()=>setMode_(k)} style={{...btn(mode===k,v.color),flex:1,padding:"8px 5px",fontSize:"12px"}}>{v.label}</button>)}</div>
        <div style={{textAlign:"center",marginBottom:"16px"}}>
          <div style={{position:"relative",width:"180px",height:"180px",margin:"0 auto 13px"}}>
            <svg viewBox="0 0 100 100" style={{transform:"rotate(-90deg)",width:"100%",height:"100%"}}>
              <circle cx="50" cy="50" r="44" fill="none" stroke={clr.dim} strokeWidth="8"/>
              <circle cx="50" cy="50" r="44" fill="none" stroke={col} strokeWidth="8" strokeDasharray={`${2*Math.PI*44}`} strokeDashoffset={`${2*Math.PI*44*(1-pct/100)}`} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:"32px",fontWeight:"900",color:col,fontVariantNumeric:"tabular-nums"}}>{mins}:{sec_}</div>
              <div style={{fontSize:"12px",color:clr.muted,marginTop:"3px"}}>{MODES[mode].label}</div>
            </div>
          </div>
          <input value={task} onChange={e=>setTask(e.target.value)} placeholder="What are you working on?" style={{...iSty,marginBottom:"12px",textAlign:"center"}}/>
          <div style={{display:"flex",gap:"8px",justifyContent:"center"}}>
            <button onClick={()=>setRunning(r=>!r)} style={{...btn(true,col),padding:"12px 26px",fontSize:"14px",borderRadius:"50px"}}>{running?"⏸ Pause":"▶ Start"}</button>
            <button onClick={()=>{setSecs(MODES[mode].min*60);setRunning(false);}} style={{...btn(false),padding:"12px 16px",fontSize:"14px",borderRadius:"50px"}}>⟳</button>
          </div>
        </div>
        <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
          <Card style={{flex:1,textAlign:"center",padding:"13px"}}><div style={{fontSize:"24px",fontWeight:"900",color:col}}>{sessions}</div><div style={{fontSize:"12px",color:clr.muted}}>Sessions</div></Card>
          <Card style={{flex:1,textAlign:"center",padding:"13px"}}><div style={{fontSize:"24px",fontWeight:"900",color:col}}>{sessions*25}</div><div style={{fontSize:"12px",color:clr.muted}}>Minutes Focused</div></Card>
        </div>
        {history.length>0&&<Card><div style={{fontSize:"11px",color:clr.accent,letterSpacing:"1px",marginBottom:"10px"}}>SESSION HISTORY</div>{history.map((h,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<history.length-1?`1px solid ${clr.dim}`:"none"}}><span style={{fontSize:"13px"}}>🍅 {h.task||"Focus session"}</span><span style={{fontSize:"12px",color:clr.muted}}>{h.mins}m · {h.at}</span></div>)}</Card>}
      </div>);
    }

    // ══════════════════════════════════════════════
    // DASHBOARD TAB
    // ══════════════════════════════════════════════
    function DashboardTab({ lectures, dayPlans, flashDecks }) {
      const today=new Date();
      const totalTasks=lectures.reduce((s,l)=>s+SCHEDULE.reduce((ss,d)=>ss+d.tasks.length,0),0);
      const doneTasks=lectures.reduce((s,l)=>s+SCHEDULE.reduce((ss,d)=>ss+d.tasks.filter((_,i)=>l.checklist?.[`${d.day}-${i}`]).length,0),0);
      const planBlocks=Object.values(dayPlans).reduce((s,d)=>s+Object.values(d).filter(b=>b.planned).length,0);
      const actBlocks=Object.values(dayPlans).reduce((s,d)=>s+Object.values(d).filter(b=>b.actual).length,0);
      const consistency=planBlocks>0?Math.round((actBlocks/planBlocks)*100):0;
      const exportCSV=()=>{const rows=[["Date","Block","Planned","Actual"]];Object.entries(dayPlans).forEach(([date,blocks])=>Object.entries(blocks).forEach(([block,val])=>{if(val.planned||val.actual)rows.push([date,block,val.planned||"",val.actual||""]);}){{const csv=rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="study_progress.csv";a.click();}}};
      const stats=[{label:"Lectures",val:lectures.length,icon:"📚",col:"#6366f1"},{label:"Tasks Done",val:`${doneTasks}/${totalTasks}`,icon:"✅",col:"#22c55e"},{label:"Flash Decks",val:flashDecks.length,icon:"🃏",col:"#f59e0b"},{label:"Planned Blocks",val:planBlocks,icon:"📋",col:"#06b6d4"},{label:"Actual Blocks",val:actBlocks,icon:"✅",col:"#ef4444"},{label:"Consistency",val:`${consistency}%`,icon:"🎯",col:"#c084fc"}];
      const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d;});
      const maxB=Math.max(...last7.map(d=>{const k=d.toISOString().split("T")[0];return Object.values(dayPlans[k]||{}).filter(b=>b.planned||b.actual).length;}),1);
      return(<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
          <SecTitle label="OVERVIEW">Progress Dashboard</SecTitle>
          <button onClick={exportCSV} style={{...btn(true,"#22c55e"),padding:"8px 12px",fontSize:"12px"}}>📊 Export CSV</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px",marginBottom:"12px"}}>{stats.map(s=>(<Card key={s.label} style={{padding:"14px"}}><div style={{fontSize:"20px",marginBottom:"3px"}}>{s.icon}</div><div style={{fontSize:"22px",fontWeight:"900",color:s.col}}>{s.val}</div><div style={{fontSize:"12px",color:clr.muted,marginTop:"2px"}}>{s.label}</div></Card>))}</div>
        {lectures.length>0&&<Card style={{marginBottom:"12px"}}><div style={{fontSize:"11px",color:clr.accent,letterSpacing:"1px",marginBottom:"10px"}}>LECTURE PROGRESS</div>{lectures.map(l=>{const total=SCHEDULE.reduce((s,d)=>s+d.tasks.length,0),done=SCHEDULE.reduce((s,d)=>s+d.tasks.filter((_,i)=>l.checklist?.[`${d.day}-${i}`]).length,0),pct=Math.round((done/total)*100);return<div key={l.id} style={{marginBottom:"10px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{fontSize:"13px",fontWeight:"700"}}>📖 {l.topic}</span><span style={{fontSize:"12px",color:pct===100?"#4ade80":clr.accent,fontWeight:"700"}}>{pct}%</span></div><div style={{height:"5px",background:clr.dim,borderRadius:"5px"}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#22c55e":"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:"5px",transition:"width 0.4s"}}/></div></div>;})}</Card>}
        <Card style={{marginBottom:"12px"}}><div style={{fontSize:"11px",color:clr.accent,letterSpacing:"1px",marginBottom:"12px"}}>LAST 7 DAYS</div>
          <div style={{display:"flex",gap:"6px",alignItems:"flex-end",height:"70px"}}>{last7.map(d=>{const k=d.toISOString().split("T")[0],pl=Object.values(dayPlans[k]||{}).filter(b=>b.planned).length,ac=Object.values(dayPlans[k]||{}).filter(b=>b.actual).length;return<div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}><div style={{width:"100%",display:"flex",gap:"2px",alignItems:"flex-end",height:"60px"}}><div style={{flex:1,height:`${Math.max((pl/maxB)*58,3)}px`,background:clr.green,borderRadius:"3px 3px 0 0",opacity:0.8}}/><div style={{flex:1,height:`${Math.max((ac/maxB)*58,3)}px`,background:clr.red,borderRadius:"3px 3px 0 0",opacity:0.8}}/></div><div style={{fontSize:"10px",color:clr.muted}}>{DAYS_OF_WEEK[d.getDay()]}</div></div>;})}
          </div>
          <div style={{display:"flex",gap:"12px",marginTop:"6px",fontSize:"11px"}}><span style={{color:clr.green}}>■ Planned</span><span style={{color:clr.red}}>■ Actual</span></div>
        </Card>
        <Card><div style={{fontSize:"11px",color:clr.accent,letterSpacing:"1px",marginBottom:"10px"}}>PLAN vs ACTUAL CONSISTENCY</div>
          <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
            <div style={{position:"relative",width:"76px",height:"76px",flexShrink:0}}>
              <svg viewBox="0 0 100 100" style={{transform:"rotate(-90deg)",width:"100%",height:"100%"}}>
                <circle cx="50" cy="50" r="40" fill="none" stroke={clr.dim} strokeWidth="14"/>
                <circle cx="50" cy="50" r="40" fill="none" stroke={consistency>=80?"#22c55e":consistency>=50?"#f59e0b":"#ef4444"} strokeWidth="14" strokeDasharray={`${2*Math.PI*40}`} strokeDashoffset={`${2*Math.PI*40*(1-consistency/100)}`} strokeLinecap="round"/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px",fontWeight:"900",color:consistency>=80?"#22c55e":consistency>=50?"#f59e0b":"#ef4444"}}>{consistency}%</div>
            </div>
            <div><div style={{fontWeight:"700",fontSize:"14px"}}>{consistency>=80?"Excellent! 🔥":consistency>=50?"Good Progress 👍":"Keep Going! 💪"}</div><div style={{fontSize:"12px",color:clr.muted,marginTop:"3px"}}>{actBlocks} of {planBlocks} planned blocks completed</div></div>
          </div>
        </Card>
      </div>);
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<StudyOS/>);
  </script>
</body>
</html>
